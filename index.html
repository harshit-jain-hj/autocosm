<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>autocosm — a self-generating universe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet" />
  <style>
* { box-sizing: border-box; }
html, body {
  margin: 0; height: 100%;
  background: #1a1612;
  color: #1a1a1a;
  font-family: 'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
  position: relative;
}
button, input, select { font-family: inherit; }
a { color: inherit; }

.backdrop {
  position: fixed; inset: 0; z-index: 0;
  background: #1d1916;
  overflow: hidden;
}
.backdrop__photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
.backdrop image-slot { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
.backdrop .vignette {
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 60% at center, transparent 30%, rgba(0,0,0,0.40) 65%, rgba(0,0,0,0.85) 100%),
    radial-gradient(ellipse at top, transparent 50%, rgba(0,0,0,0.35) 100%);
  z-index: 1;
}
.backdrop .grain {
  position: absolute; inset: 0; pointer-events: none; opacity: 0.12; mix-blend-mode: overlay;
  background-image:
    repeating-radial-gradient(circle at 13% 17%, rgba(255,255,255,0.4) 0 1px, transparent 1px 3px),
    repeating-radial-gradient(circle at 78% 62%, rgba(0,0,0,0.4) 0 1px, transparent 1px 4px);
  z-index: 1;
}

.stage-room {
  position: fixed; inset: 0; z-index: 2;
  display: flex; align-items: center; justify-content: center;
  padding: 4vh 4vw 0; pointer-events: none;
}
.laptop {
  pointer-events: auto;
  width: min(96vw, 1480px); max-height: 88vh;
  aspect-ratio: 16 / 10; position: relative;
  filter: drop-shadow(0 30px 40px rgba(0,0,0,0.5));
}
.laptop__screen {
  position: absolute; inset: 0; background: #0d0c0a; border-radius: 14px;
  padding: 14px 14px 22px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), inset 0 1px 0 rgba(255,255,255,0.08);
  display: flex; flex-direction: column;
}
.laptop__camera {
  position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
  width: 5px; height: 5px; border-radius: 50%; background: #1a1916;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}
.laptop__screen-inner {
  flex: 1; min-height: 0; background: #f3f1ec; border-radius: 4px; overflow: hidden; position: relative;
}
.laptop__notch {
  position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
  width: 90px; height: 4px; background: rgba(255,255,255,0.05); border-radius: 0 0 6px 6px;
}
.laptop__glare {
  position: absolute; inset: 14px 14px 22px; border-radius: 4px; pointer-events: none;
  background: linear-gradient(120deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 25%, transparent 50%);
  mix-blend-mode: screen; z-index: 3;
}
.laptop__base {
  position: absolute; left: -3.5%; right: -3.5%; bottom: -1.4%; height: 1.4%;
  background: linear-gradient(180deg, #1f1d1a 0%, #0d0c0a 100%);
  border-radius: 0 0 8px 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}
.laptop__lip {
  position: absolute; left: 42%; right: 42%; bottom: -1.4%; height: 1.4%;
  background: #050505; border-radius: 0 0 6px 6px;
}

#root, .deck { height: 100%; }
.deck { display: flex; flex-direction: column; position: relative; }
.deck__viewport { flex: 1; min-height: 0; position: relative; overflow: hidden; background: #f3f1ec; }
.deck__slide {
  position: absolute; inset: 0;
  container-type: inline-size; container-name: slide;
  animation: slideIn 0.45s cubic-bezier(.2,.7,.2,1) both;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.deck.tf-serif { --body: 'Cambria', 'Georgia', 'Times New Roman', serif; }
.deck.tf-sans  { --body: 'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif; }
.deck.tf-mono  { --body: 'SF Mono','Menlo','Consolas',monospace; }

.dn {
  flex: 0 0 auto; height: 38px;
  background: rgba(15, 14, 12, 0.92); backdrop-filter: blur(10px);
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; gap: 10px; padding: 0 14px;
  font-family: 'SF Mono','Menlo','Consolas',monospace;
  color: rgba(255,232,200,0.7); font-size: 10px; letter-spacing: 0.16em;
}
.dn__arrow {
  width: 22px; height: 22px; border-radius: 4px; background: transparent;
  border: 1px solid rgba(255,255,255,0.1); color: rgba(255,232,200,0.8);
  cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
  font-size: 15px; line-height: 1; padding: 0; transition: background 0.15s;
}
.dn__arrow:hover { background: rgba(255,255,255,0.06); }
.dn__dots { display: flex; gap: 4px; flex: 1; align-items: center; overflow: hidden; }
.dn__dot {
  display: flex; flex-direction: column; align-items: stretch; justify-content: center; gap: 4px;
  background: transparent; border: 0; padding: 6px 10px; flex: 1; cursor: pointer;
  color: inherit; min-width: 0;
}
.dn__dot-bar { height: 2px; background: rgba(255,232,200,0.18); transition: background 0.2s; }
.dn__dot:hover .dn__dot-bar { background: rgba(255,232,200,0.4); }
.dn__dot.is-active .dn__dot-bar { background: oklch(0.78 0.14 60); }
.dn__dot-label {
  text-transform: uppercase; font-size: 9px; letter-spacing: 0.22em;
  text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  opacity: 0.55; transition: opacity 0.2s;
}
.dn__dot:hover .dn__dot-label { opacity: 0.85; }
.dn__dot.is-active .dn__dot-label { opacity: 1; color: rgba(255,232,200,0.95); }
.dn__count {
  flex: 0 0 auto; font-variant-numeric: tabular-nums; font-size: 10px;
  letter-spacing: 0.18em; color: rgba(255,232,200,0.55);
}

/* 01 ME */
.me {
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at 30% 0%, rgba(220,200,170,0.35), transparent 60%), #efe9dd;
  color: #1a1612; display: grid; grid-template-rows: auto 1fr auto;
  font-family: var(--body, 'Cambria','Georgia',serif); position: relative;
}
.me::before {
  content: ""; position: absolute; inset: 0;
  background-image: repeating-linear-gradient(135deg, transparent 0 12px, rgba(120,90,60,0.025) 12px 13px);
  pointer-events: none;
}
.me__hdr, .me__foot {
  display: flex; justify-content: space-between; align-items: center;
  padding: clamp(14px, 2.2cqi, 26px) clamp(20px, 4cqi, 56px);
  font-family: 'SF Mono','Menlo','Consolas',monospace;
  font-size: clamp(9px, 1cqi, 11px); letter-spacing: 0.22em; text-transform: uppercase; color: #6b5742;
}
.me__foot { gap: 16px; }
.me__rule { flex: 1; height: 1px; background: #6b5742; opacity: 0.4; }
.me__inner {
  align-self: center; justify-self: center;
  padding: 0 clamp(24px, 5cqi, 80px); max-width: 86%; text-align: center;
}
.me__kicker {
  margin: 0 0 clamp(10px, 1.6cqi, 22px);
  font-family: 'SF Mono','Menlo',monospace;
  font-size: clamp(9.5px, 1.1cqi, 12px); letter-spacing: 0.32em; text-transform: uppercase; color: #806542;
}
.me__title {
  margin: 0; font-size: clamp(48px, 11cqi, 160px); font-weight: 700;
  letter-spacing: -0.05em; line-height: 0.95; color: #1a1612;
}
.me__pron {
  margin: clamp(8px, 1.2cqi, 14px) 0 clamp(20px, 3cqi, 36px);
  font-style: italic; font-size: clamp(12px, 1.6cqi, 18px); color: #6b5742;
}
.me__defn {
  margin: 0 auto; max-width: 28em; font-size: clamp(14px, 2cqi, 22px);
  line-height: 1.45; color: #2c2419; letter-spacing: -0.005em;
}
.me__sig {
  margin: clamp(14px, 2.2cqi, 26px) 0 0; font-style: italic;
  font-size: clamp(11px, 1.4cqi, 15px); color: #806542;
}
.me__meta {
  margin: clamp(22px, 4cqi, 52px) auto 0; display: inline-flex; flex-direction: column; gap: 4px;
  font-family: 'SF Mono','Menlo',monospace; font-size: clamp(9px, 1cqi, 11px);
  letter-spacing: 0.16em; text-transform: uppercase; color: #6b5742;
  border-top: 1px solid rgba(107,87,66,0.3); padding-top: clamp(10px, 1.5cqi, 16px);
}
.me__meta-row { display: flex; gap: 20px; justify-content: space-between; min-width: 220px; }
.me__meta-row b { color: #1a1612; font-weight: 600; }

/* 02 VERISSIMUS */
.vr {
  width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 100% 0%, rgba(40,80,60,0.22), transparent 50%),
    linear-gradient(180deg, #0a0d0a 0%, #050706 100%);
  color: #d8e6dc; display: grid; grid-template-rows: auto auto 1fr auto;
  padding: clamp(14px, 2.4cqi, 28px) clamp(20px, 3.4cqi, 44px);
  gap: clamp(10px, 1.8cqi, 22px);
  font-family: 'SF Mono','Menlo','Consolas',monospace; position: relative; overflow: hidden; min-height: 0;
}
.vr::before {
  content: ""; position: absolute; inset: 0;
  background-image: repeating-linear-gradient(180deg, transparent 0 3px, rgba(80,160,120,0.025) 3px 4px);
  pointer-events: none; mix-blend-mode: screen;
}
.vr__hdr {
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid rgba(120,180,140,0.18); padding-bottom: clamp(8px, 1.4cqi, 16px);
}
.vr__brand { display: flex; align-items: baseline; gap: clamp(8px, 1.4cqi, 14px); }
.vr__brand-mark { font-size: clamp(14px, 2cqi, 22px); color: oklch(0.78 0.14 145); }
.vr__brand-name { font-size: clamp(15px, 2.2cqi, 24px); letter-spacing: 0.28em; font-weight: 700; color: #f0fce8; }
.vr__brand-sub { font-size: clamp(8.5px, 1cqi, 11px); letter-spacing: 0.32em; color: rgba(180,210,190,0.55); }
.vr__ticker { display: inline-flex; align-items: center; gap: 8px; font-size: clamp(8.5px, 1cqi, 11px); letter-spacing: 0.24em; color: rgba(180,210,190,0.7); }
.vr__ticker-dot {
  width: 7px; height: 7px; border-radius: 50%; background: oklch(0.78 0.18 145);
  box-shadow: 0 0 8px oklch(0.78 0.18 145); animation: recBlink 1.8s ease-in-out infinite;
}
.vr__lede { display: grid; grid-template-columns: 0.9fr 1fr 1.4fr; gap: clamp(16px, 3cqi, 36px); align-items: center; }
.vr__stat { display: flex; flex-direction: column; border-right: 1px solid rgba(120,180,140,0.18); padding-right: clamp(12px, 2cqi, 24px); }
.vr__stat-num { font-size: clamp(54px, 11cqi, 140px); font-weight: 700; letter-spacing: -0.06em; line-height: 0.9; color: oklch(0.85 0.18 145); font-variant-numeric: tabular-nums; }
.vr__stat-pct { font-size: 0.55em; opacity: 0.7; }
.vr__stat-cap { margin-top: 6px; font-size: clamp(9px, 1.05cqi, 12px); letter-spacing: 0.24em; text-transform: uppercase; color: rgba(180,210,190,0.65); }
.vr__split { display: flex; flex-direction: column; gap: clamp(6px, 1cqi, 10px); }
.vr__split-row { display: grid; grid-template-columns: 70px 1fr 80px; gap: clamp(8px, 1.4cqi, 14px); align-items: center; font-size: clamp(11px, 1.4cqi, 15px); }
.vr__split-row--mini { font-size: clamp(9.5px, 1.1cqi, 12px); opacity: 0.7; }
.vr__split-label { color: rgba(180,210,190,0.7); letter-spacing: 0.12em; font-size: clamp(9px, 1cqi, 11px); text-transform: uppercase; }
.vr__split-bar { height: 6px; background: rgba(255,255,255,0.06); border-radius: 1px; overflow: hidden; position: relative; }
.vr__split-bar span { display: block; height: 100%; background: oklch(0.78 0.16 145); animation: fillBar 1s cubic-bezier(.2,.7,.2,1) both 0.2s; transform-origin: left; }
@keyframes fillBar { from { transform: scaleX(0); } to { transform: scaleX(1); } }
.vr__split-val { color: #f0fce8; font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; }
.vr__bio { font-family: 'Cambria','Georgia',serif; font-size: clamp(11px, 1.5cqi, 16px); line-height: 1.5; color: rgba(220,235,225,0.85); letter-spacing: -0.01em; padding-left: clamp(12px, 2cqi, 24px); border-left: 1px solid rgba(120,180,140,0.18); }
.vr__bio p { margin: 0; }
.vr__bio b { color: oklch(0.86 0.14 145); font-weight: 600; font-style: italic; }
.vr__scroll { min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: clamp(12px, 2cqi, 26px); scrollbar-width: thin; scrollbar-color: rgba(120,180,140,0.25) transparent; }
.vr__scroll::-webkit-scrollbar { width: 4px; }
.vr__scroll::-webkit-scrollbar-thumb { background: rgba(120,180,140,0.25); border-radius: 2px; }
.vr__ledger { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: clamp(12px, 2cqi, 26px); flex-shrink: 0; }
.vr__manifesto { border-top: 1px dashed rgba(120,180,140,0.22); padding-top: clamp(16px, 2.4cqi, 28px); padding-bottom: clamp(16px, 2.4cqi, 28px); display: flex; flex-direction: column; gap: clamp(10px, 1.6cqi, 18px); flex-shrink: 0; }
.vr__manifesto p { margin: 0; font-family: 'Cambria','Georgia',serif; font-size: clamp(13px, 1.65cqi, 17px); line-height: 1.65; color: rgba(220,235,225,0.78); letter-spacing: -0.01em; }
.vr__manifesto-q { font-style: italic; }
.vr__lcol--wide { grid-column: span 2; }
.vr__lcol--wide .vr__lcol-rows { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(6, auto); grid-auto-flow: column; column-gap: clamp(10px, 1.8cqi, 22px); align-content: start; }
.vr__lcol { display: flex; flex-direction: column; min-height: 0; }
.vr__lcol-h { font-size: clamp(9px, 1.05cqi, 11.5px); letter-spacing: 0.28em; text-transform: uppercase; color: oklch(0.86 0.14 145); padding-bottom: clamp(6px, 1cqi, 10px); border-bottom: 1px solid rgba(120,180,140,0.28); }
.vr__lcol-rows { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
.vr__lcol-row { display: grid; grid-template-columns: 1fr auto 14px; gap: clamp(6px, 1cqi, 12px); align-items: baseline; padding: clamp(3px, 0.7cqi, 6px) 0; border-bottom: 1px dotted rgba(120,180,140,0.12); font-size: clamp(10px, 1.25cqi, 13.5px); animation: slideUpVr 0.4s cubic-bezier(.2,.7,.2,1) both; }
@keyframes slideUpVr { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.vr__lcol-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #e6f3e6; font-weight: 500; letter-spacing: -0.005em; }
.vr__lcol-mult { font-variant-numeric: tabular-nums; color: oklch(0.86 0.14 145); font-weight: 700; letter-spacing: -0.02em; }
.vr__lcol-stat { font-size: 9px; text-align: center; color: oklch(0.86 0.14 145); }
.vr__lcol-row--holding .vr__lcol-stat { color: rgba(180,210,190,0.5); }
.vr__foot { display: flex; justify-content: space-between; font-size: clamp(8.5px, 1cqi, 10.5px); letter-spacing: 0.22em; text-transform: uppercase; color: rgba(180,210,190,0.5); border-top: 1px solid rgba(120,180,140,0.18); padding-top: clamp(6px, 1cqi, 12px); }

/* 03 DYEUS */
.dy {
  width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 50% 100%, rgba(120,90,180,0.18), transparent 55%),
    radial-gradient(ellipse at 50% 0%, rgba(40,60,120,0.25), transparent 55%),
    #050810;
  color: #f0eee6; display: grid; grid-template-rows: auto 1fr auto;
  padding: clamp(14px, 2.4cqi, 30px) clamp(24px, 5cqi, 70px);
  gap: clamp(14px, 2.4cqi, 32px);
  font-family: 'Fraunces', 'Cambria', 'Georgia', serif;
  position: relative; overflow: hidden;
}
.dy__stars {
  position: absolute; inset: 0;
  background-image:
    radial-gradient(1px 1px at 22% 18%, rgba(255,255,255,0.7), transparent 50%),
    radial-gradient(1px 1px at 67% 32%, rgba(255,255,255,0.6), transparent 50%),
    radial-gradient(1.5px 1.5px at 14% 72%, rgba(255,255,255,0.9), transparent 50%),
    radial-gradient(1px 1px at 84% 81%, rgba(255,255,255,0.6), transparent 50%),
    radial-gradient(0.8px 0.8px at 41% 49%, rgba(255,255,255,0.5), transparent 50%),
    radial-gradient(1px 1px at 92% 12%, rgba(255,255,255,0.7), transparent 50%),
    radial-gradient(1.5px 1.5px at 33% 86%, rgba(255,255,255,0.85), transparent 50%),
    radial-gradient(0.8px 0.8px at 58% 67%, rgba(255,255,255,0.6), transparent 50%),
    radial-gradient(1px 1px at 72% 9%, rgba(255,255,255,0.5), transparent 50%),
    radial-gradient(1px 1px at 8% 39%, rgba(255,255,255,0.6), transparent 50%);
  opacity: 0.7;
}
.dy__hdr { display: flex; justify-content: space-between; font-family: 'SF Mono','Menlo','Consolas',monospace; font-size: clamp(9px, 1.05cqi, 11.5px); letter-spacing: 0.28em; text-transform: uppercase; color: rgba(240,238,230,0.5); position: relative; z-index: 1; }
.dy__center { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; z-index: 1; gap: clamp(20px, 3.5cqi, 44px); }
.dy__name { margin: 0; font-size: clamp(60px, 13cqi, 200px); font-weight: 400; letter-spacing: -0.03em; line-height: 0.92; color: #fff8e6; font-style: italic; font-family: 'Cormorant Garamond','Cormorant','Cambria','Georgia',serif; }
.dy__tagline { margin: 0; font-size: clamp(12px, 1.6cqi, 18px); letter-spacing: 0.18em; text-transform: uppercase; color: rgba(240,238,230,0.5); font-family: 'SF Mono','Menlo',monospace; font-style: normal; font-weight: 400; }
.dy__body-text { margin: 0 auto; max-width: 34em; font-size: clamp(14px, 2cqi, 22px); line-height: 1.6; letter-spacing: -0.01em; color: rgba(240,238,230,0.82); font-style: italic; font-weight: 300; font-family: 'Cormorant Garamond','Cormorant','Fraunces','Cambria','Georgia',serif; }
.dy__foot { display: flex; justify-content: space-between; font-family: 'SF Mono','Menlo',monospace; font-size: clamp(8.5px, 1cqi, 11px); letter-spacing: 0.24em; text-transform: uppercase; color: rgba(240,238,230,0.45); border-top: 1px solid rgba(240,238,230,0.15); padding-top: clamp(8px, 1.2cqi, 14px); position: relative; z-index: 1; }

/* 04 WORLDVIEW */
.wv {
  width: 100%; height: 100%; background: #efe9dd; color: #1a1612;
  display: grid; grid-template-rows: auto 1fr auto;
  padding: clamp(14px, 2.4cqi, 28px) clamp(22px, 4cqi, 56px);
  gap: clamp(12px, 2cqi, 24px);
  font-family: var(--body, 'Cambria','Georgia',serif); position: relative;
}
.wv::before { content: ""; position: absolute; inset: 0; background-image: repeating-linear-gradient(135deg, transparent 0 12px, rgba(120,90,60,0.025) 12px 13px); pointer-events: none; }
.wv__masthead { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #1a1612; padding-bottom: clamp(8px, 1.2cqi, 14px); position: relative; z-index: 1; }
.wv__masthead-l { display: flex; align-items: center; gap: clamp(10px, 1.8cqi, 22px); }
.wv__name { font-size: clamp(28px, 6.4cqi, 80px); font-weight: 700; letter-spacing: -0.045em; line-height: 1; color: #1a1612; }
.wv__rule { width: 1px; height: clamp(20px, 3cqi, 36px); background: #6b5742; opacity: 0.4; }
.wv__tag { font-family: 'SF Mono','Menlo',monospace; font-size: clamp(9px, 1cqi, 11px); letter-spacing: 0.16em; text-transform: uppercase; color: #6b5742; max-width: 18em; line-height: 1.4; }
.wv__masthead-r { display: flex; gap: 8px; font-family: 'SF Mono','Menlo',monospace; font-size: clamp(8.5px, 1cqi, 11px); letter-spacing: 0.18em; text-transform: uppercase; color: #6b5742; }
.wv__essays { display: flex; flex-direction: column; gap: clamp(6px, 1cqi, 10px); min-height: 0; }
.wv__essays-h { display: flex; justify-content: space-between; align-items: baseline; font-family: 'SF Mono','Menlo',monospace; font-size: clamp(9px, 1cqi, 11px); letter-spacing: 0.22em; text-transform: uppercase; color: #806542; }
.wv__essays-grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(6px, 1cqi, 10px); flex: 1; }

  <script type="text/babel">
const { useEffect, useCallback } = React;
const { useTweaks, TweaksPanel, TweakSection, TweakToggle, TweakRadio } = window;

const TWEAK_DEFAULTS = { typeface: "serif", hud: true };

const SLIDES = [
  { id: "me",         label: "Me",         Comp: () => window.MeSlide         && <window.MeSlide /> },
  { id: "verissimus", label: "Verissimus", Comp: () => window.VerissimusSlide && <window.VerissimusSlide /> },
  { id: "dyeus",      label: "Dyeus",      Comp: () => window.DyeusSlide      && <window.DyeusSlide /> },
  { id: "worldview",  label: "Worldview",  Comp: () => window.WorldviewSlide  && <window.WorldviewSlide /> },
  { id: "music",      label: "Music",      Comp: () => window.MusicSlide      && <window.MusicSlide /> },
  { id: "moodboard",  label: "Moodboard",  Comp: () => window.MoodboardSlide  && <window.MoodboardSlide /> },
];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [i, setI] = React.useState(0);
  const slide = SLIDES[i];
  const stepBy = useCallback((d) => setI((cur) => (cur + d + SLIDES.length) % SLIDES.length), []);

  useEffect(() => {
    const onKey = (e) => {
      if (e.target && /input|textarea/i.test(e.target.tagName)) return;
      if (e.key === "ArrowRight" || e.key === "ArrowDown" || e.key === " " || e.key === "j") { stepBy(1); e.preventDefault(); }
      else if (e.key === "ArrowLeft" || e.key === "ArrowUp" || e.key === "k") { stepBy(-1); e.preventDefault(); }
      else if (/^[1-6]$/.test(e.key)) setI(parseInt(e.key, 10) - 1);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [stepBy]);

  useEffect(() => { document.body.classList.toggle("hud-off", !t.hud); }, [t.hud]);

  return (
    <div className={"deck tf-" + (t.typeface || "serif")}>
      <div className="deck__viewport">
        <div className="deck__slide" key={slide.id}>{slide.Comp()}</div>
      </div>
      <DeckNav i={i} count={SLIDES.length} slides={SLIDES} onPick={setI} onPrev={() => stepBy(-1)} onNext={() => stepBy(1)} />
      <TweaksPanel>
        <TweakSection label="Typeface">
          <TweakRadio label="Body type" value={t.typeface} onChange={(v) => setTweak("typeface", v)}
            options={[{ value: "serif", label: "Serif" }, { value: "sans", label: "Sans" }, { value: "mono", label: "Mono" }]} />
        </TweakSection>
        <TweakSection label="Atmosphere">
          <TweakToggle label="Surveillance HUD" value={t.hud} onChange={(v) => setTweak("hud", v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

function DeckNav({ i, count, slides, onPick, onPrev, onNext }) {
  return (
    <div className="dn">
      <button className="dn__arrow" onClick={onPrev} aria-label="Previous">‹</button>
      <div className="dn__dots">
        {slides.map((s, idx) => (
          <button key={s.id} className={"dn__dot " + (idx === i ? "is-active" : "")} onClick={() => onPick(idx)} aria-label={"Go to " + s.label} title={s.label}>
            <span className="dn__dot-bar" />
            <span className="dn__dot-label">{s.label}</span>
          </button>
        ))}
      </div>
      <button className="dn__arrow" onClick={onNext} aria-label="Next">›</button>
      <div className="dn__count">{String(i + 1).padStart(2, "0")} / {String(count).padStart(2, "0")}</div>
    </div>
  );
}

window.App = App;

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
