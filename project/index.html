<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>autocosm — a self-generating universe</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Full-bleed backdrop. Drop your own photo. -->
  <div class="backdrop">
    <image-slot id="desk-photo" shape="rect" placeholder="drop a desk photo (the laptop sits on it)"></image-slot>
    <div class="grain"></div>
    <div class="vignette"></div>
  </div>

  <!-- The laptop, centered on the desk. -->
  <div class="stage-room">
    <div class="laptop">
      <div class="laptop__screen">
        <div class="laptop__camera"></div>
        <div class="laptop__screen-inner">
          <div id="root"></div>
        </div>
        <div class="laptop__notch"></div>
      </div>
      <div class="laptop__glare"></div>
      <div class="laptop__base"></div>
      <div class="laptop__lip"></div>
    </div>
  </div>

  <!-- Surveillance HUD overlay — top layer, sells the "eavesdrop" feel -->
  <div class="hud" aria-hidden="true">
    <div class="hud__corner hud__corner--tl"></div>
    <div class="hud__corner hud__corner--tr"></div>
    <div class="hud__corner hud__corner--bl"></div>
    <div class="hud__corner hud__corner--br"></div>

    <div class="hud__rec">
      <span class="hud__rec-dot"></span>
      <span class="hud__rec-label">OBSERVING</span>
      <span class="hud__rec-time" id="hud-time">23:47:11</span>
    </div>

    <div class="hud__stamp">
      <span>AUTOCOSM.XYZ</span>
      <span class="hud__stamp-sep">·</span>
      <span>CAM 04 / LIVE</span>
    </div>

    <div class="hud__crosshair">
      <span class="hud__crosshair-h"></span>
      <span class="hud__crosshair-v"></span>
    </div>
  </div>

  <script>
    // Tick the surveillance clock — adds to the live-feed feel.
    (function () {
      var t = document.getElementById('hud-time');
      if (!t) return;
      function tick() {
        var d = new Date();
        var p = function (n) { return String(n).padStart(2, '0'); };
        t.textContent = p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
      }
      tick(); setInterval(tick, 1000);
    })();
  </script>

  <script src="image-slot.js"></script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="slides.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<window.App />);
  </script>
</body>
</html>
